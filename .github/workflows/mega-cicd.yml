name: Node.js CI

on:
  push:
    branches: [ "main" ]


jobs:
  build:

    runs-on: ubuntu-latest


    steps:
    - uses: actions/checkout@v4
    - name: setup nodejs
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: install dependences
      run: npm ci

    - name: run task
      run: npm test
